<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Fundos — CAGR</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1916;
    --muted: #7a7870;
    --green: #1a7a52;  --green-light: #e8f5ee;
    --blue: #1a4a8a;   --blue-light: #e8eef8;
    --amber: #a05c00;  --amber-light: #fdf3e3;
    --red: #b83232;    --red-light: #fdeaea;
    --accent: #e05c2a;
  }
  [data-theme=dark] {
    --bg: #141412;
    --surface: #1e1d1a;
    --border: rgba(255,255,255,0.09);
    --text: #e8e6e0;
    --muted: #7a7870;
    --green: #2db87a;  --green-light: #0d2e1e;
    --blue: #4d8fd4;   --blue-light: #0d1e33;
    --amber: #d4882a;  --amber-light: #2a1e07;
    --red: #e05050;    --red-light: #2a0f0f;
    --accent: #f07040;
  }

  body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
    max-width: 1100px;
    margin: 0 auto;
    transition: background 0.2s, color 0.2s;
  }

  /* ── Header ─────────────────────────────────────────────────────── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  h1 { font-size: 1.6rem; font-weight: normal; letter-spacing: -0.02em; margin-bottom: 0.25rem; }
  .subtitle { font-size: 0.82rem; color: var(--muted); font-family: 'Courier New', monospace; }

  /* ── Theme toggle ─────────────────────────────────────────────── */
  .theme-btn {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-top: 4px;
  }
  .theme-btn:hover { border-color: var(--text); color: var(--text); }

  /* ── Sort nav ─────────────────────────────────────────────────── */
  nav { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  nav button {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  nav button:hover { border-color: var(--text); color: var(--text); }
  nav button.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── Status bar ───────────────────────────────────────────────── */
  .status-bar {
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
  }
  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }
  .status-dot.loading { background: var(--amber); animation: pulse 1.2s infinite; }
  .status-dot.ok      { background: var(--green); }
  .status-dot.error   { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Table ────────────────────────────────────────────────────── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }

  thead th {
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 12px 16px;
    text-align: right;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  thead th:first-child { text-align: left; cursor: default; }
  thead th.sortable:hover { color: var(--text); }
  thead th.sorted { color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }

  td {
    padding: 13px 16px;
    font-size: 0.84rem;
    text-align: right;
    vertical-align: middle;
  }
  td:first-child { text-align: left; }

  .rank {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    font-weight: bold;
    background: var(--border);
    color: var(--muted);
    margin-right: 10px;
    flex-shrink: 0;
  }
  .rank.r1 { background: #c9960c; color: #fff; }
  .rank.r2 { background: #8a8a8a; color: #fff; }
  .rank.r3 { background: #9c5c2a; color: #fff; }

  .fund-name-cell { display: flex; align-items: center; min-width: 220px; }
  .fund-name  { font-size: 0.84rem; line-height: 1.3; }
  .fund-cnpj  { font-family: 'Courier New', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  .cagr-val      { font-family: 'Courier New', monospace; font-size: 0.88rem; font-weight: bold; }
  .cagr-val.pos  { color: var(--green); }
  .cagr-val.neg  { color: var(--red); }
  .cagr-val.na   { color: var(--muted); font-weight: normal; font-size: 0.78rem; }
  .tenure        { font-family: 'Courier New', monospace; font-size: 0.78rem; color: var(--muted); }

  /* ── Skeleton ─────────────────────────────────────────────────── */
  .skeleton {
    display: inline-block;
    height: 14px;
    border-radius: 4px;
    background: var(--border);
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }

  /* ── Legend ───────────────────────────────────────────────────── */
  .legend {
    margin-top: 1.2rem;
    font-family: 'Courier New', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    line-height: 1.9;
  }
  .legend span { margin-right: 1.5rem; }

  @media (max-width: 600px) {
    body { padding: 1.2rem 1rem 3rem; }
    h1   { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Ranking de Fundos</h1>
    <div class="subtitle">CAGR calculado com dados diários da CVM · atualizado automaticamente</div>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☽ escuro</button>
</div>

<nav>
  <button onclick="sortBy('inception')" id="btn-inception" class="active">CAGR desde início ↓</button>
  <button onclick="sortBy('cagr12')"   id="btn-cagr12">CAGR 12M ↓</button>
  <button onclick="sortBy('cagr36')"   id="btn-cagr36">CAGR 36M ↓</button>
  <button onclick="sortBy('cagr60')"   id="btn-cagr60">CAGR 60M ↓</button>
  <button onclick="sortBy('tenure')"   id="btn-tenure">Tempo de atividade ↓</button>
</nav>

<div class="status-bar">
  <div><span class="status-dot loading" id="statusDot"></span><span id="statusText">Carregando dados…</span></div>
  <div id="statusDate"></div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#&nbsp;&nbsp;Fundo</th>
        <th class="sortable sorted" onclick="sortBy('cagr12')"   id="th-cagr12">CAGR 12M ↕</th>
        <th class="sortable"        onclick="sortBy('cagr36')"   id="th-cagr36">CAGR 36M ↕</th>
        <th class="sortable"        onclick="sortBy('cagr60')"   id="th-cagr60">CAGR 60M ↕</th>
        <th class="sortable"        onclick="sortBy('inception')" id="th-inception">CAGR desde início ↕</th>
        <th class="sortable"        onclick="sortBy('tenure')"   id="th-tenure">Atividade ↕</th>
      </tr>
    </thead>
    <tbody id="fundBody"></tbody>
  </table>
</div>

<div class="legend">
  <span>CAGR = taxa de crescimento anual composta</span>
  <span>N/D = dados insuficientes para o período</span>
  <span>Fonte: CVM / inf_diario_fi</span>
</div>

<script>
// ── Theme ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '☽ escuro' : '☀ claro';
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeBtn').textContent = '☀ claro';
  }
})();

// ── State ────────────────────────────────────────────────────────────────────
let funds = [];
let currentSort = 'inception';

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmtPct(v) {
  if (v === null || v === undefined || isNaN(v))
    return '<span class="cagr-val na">N/D</span>';
  const sign = v >= 0 ? '+' : '';
  return `<span class="cagr-val ${v >= 0 ? 'pos' : 'neg'}">${sign}${v.toFixed(2)}%</span>`;
}

function fmtTenure(d) {
  if (!d) return '<span class="tenure">—</span>';
  const start = new Date(d), today = new Date();
  let y = today.getFullYear() - start.getFullYear();
  let m = today.getMonth()    - start.getMonth();
  if (m < 0) { y--; m += 12; }
  const parts = [];
  if (y > 0) parts.push(y + ' ano'  + (y > 1 ? 's' : ''));
  if (m > 0) parts.push(m + ' mês'  + (m > 1 ? 'es' : ''));
  return `<span class="tenure">${parts.join(' ') || '< 1 mês'}</span>`;
}

function tenureDays(d) {
  if (!d) return 0;
  return (new Date() - new Date(d)) / 86400000;
}

function getSortVal(f, key) {
  const map = { cagr12: f.cagr12, cagr36: f.cagr36, cagr60: f.cagr60, inception: f.cagrInception };
  if (key === 'tenure') return tenureDays(f.inceptionDate);
  return map[key] ?? -Infinity;
}

// ── Sort ─────────────────────────────────────────────────────────────────────
function sortBy(key) {
  currentSort = key;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const navBtn = document.getElementById('btn-' + key);
  if (navBtn) navBtn.classList.add('active');
  ['cagr12','cagr36','cagr60','inception','tenure'].forEach(k => {
    const th = document.getElementById('th-' + k);
    if (th) th.classList.toggle('sorted', k === key);
  });
  render();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const sorted = [...funds].sort((a, b) => getSortVal(b, currentSort) - getSortVal(a, currentSort));
  document.getElementById('fundBody').innerHTML = sorted.map((f, i) => {
    const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '';
    if (f.error) {
      return `<tr>
        <td><div class="fund-name-cell">
          <span class="rank ${rc}">${i+1}</span>
          <div><div class="fund-name">${f.name}</div><div class="fund-cnpj">${f.cnpjFmt}</div></div>
        </div></td>
        <td colspan="5" style="text-align:center;font-family:'Courier New',monospace;font-size:0.72rem;color:var(--red)">
          dados não encontrados na CVM
        </td></tr>`;
    }
    return `<tr>
      <td><div class="fund-name-cell">
        <span class="rank ${rc}">${i+1}</span>
        <div><div class="fund-name">${f.name}</div><div class="fund-cnpj">${f.cnpjFmt}</div></div>
      </div></td>
      <td>${fmtPct(f.cagr12)}</td>
      <td>${fmtPct(f.cagr36)}</td>
      <td>${fmtPct(f.cagr60)}</td>
      <td>${fmtPct(f.cagrInception)}</td>
      <td>${fmtTenure(f.inceptionDate)}</td>
    </tr>`;
  }).join('');
}

// ── Load data.json ────────────────────────────────────────────────────────────
async function load() {
  try {
    const res  = await fetch('data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    funds = data.funds;

    // Status bar
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const dateEl = document.getElementById('statusDate');

    const errors = funds.filter(f => f.error).length;
    dot.className = errors ? 'status-dot error' : 'status-dot ok';
    text.textContent = errors
      ? `${funds.length - errors} de ${funds.length} fundos carregados (${errors} com erro)`
      : `${funds.length} fundos · dados da CVM`;

    // Latest date across all funds
    const dates = funds.filter(f => f.latestDate).map(f => f.latestDate).sort();
    if (dates.length) {
      const [y, m, d] = dates[dates.length - 1].split('-');
      dateEl.textContent = `Última cota: ${d}/${m}/${y}`;
    }

    // Generated timestamp
    if (data.generatedAt) {
      const gen = new Date(data.generatedAt);
      const pad = n => String(n).padStart(2,'0');
      dateEl.textContent += ` · gerado ${pad(gen.getUTCDate())}/${pad(gen.getUTCMonth()+1)} às ${pad(gen.getUTCHours())}:${pad(gen.getUTCMinutes())} UTC`;
    }

    render();
  } catch (e) {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').textContent = 'Erro ao carregar data.json: ' + e.message;
  }
}

// ── Skeleton while loading ────────────────────────────────────────────────────
document.getElementById('fundBody').innerHTML = Array.from({length: 12}, (_, i) => `<tr>
  <td><div class="fund-name-cell">
    <span class="rank">${i+1}</span>
    <div><span class="skeleton" style="width:${140+Math.random()*80|0}px;display:block;margin-bottom:5px"></span>
         <span class="skeleton" style="width:110px;height:10px"></span></div>
  </div></td>
  ${Array.from({length:5}, () => `<td><span class="skeleton" style="width:56px"></span></td>`).join('')}
</tr>`).join('');

sortBy('inception');
load();
</script>
</body>
</html>
